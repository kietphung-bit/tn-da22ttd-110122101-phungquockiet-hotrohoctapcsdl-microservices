spring.application.name=backend
spring.datasource.url=jdbc:postgresql://localhost:5432/tempdb
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DevTools enables persistent servlet sessions by default. On some Windows
# machines Spring Boot 4 rejects the temp session directory ownership, so keep
# the JWT API stateless and avoid Tomcat session persistence during dev runs.
server.servlet.session.persistent=false

app.seed.enabled=true

ai.provider=${AI_PROVIDER:MOCK}
ai.rag.top-k=${AI_RAG_TOP_K:3}
ai.chat.rate-limit-per-minute=${AI_CHAT_RATE_LIMIT_PER_MINUTE:10}
ai.chat.history-window-messages=${AI_CHAT_HISTORY_WINDOW_MESSAGES:8}
ai.embedding.provider=${AI_EMBEDDING_PROVIDER:MOCK}
ai.embedding.model=${AI_EMBEDDING_MODEL:mock-hashing-embedding}
ai.embedding.dimension=${AI_EMBEDDING_DIMENSION:384}
ai.embedding.pgvector-enabled=${AI_EMBEDDING_PGVECTOR_ENABLED:true}
ai.embedding.vector-retrieval-enabled=${AI_VECTOR_RETRIEVAL_ENABLED:true}
ai.embedding.vector-index-enabled=${AI_EMBEDDING_VECTOR_INDEX_ENABLED:true}
ai.embedding.generate-on-startup=${AI_EMBEDDING_GENERATE_ON_STARTUP:false}
ai.gemini.api-key=${AI_GEMINI_API_KEY:}
ai.gemini.model=${AI_GEMINI_MODEL:gemini-2.0-flash}
ai.openai.api-key=${AI_OPENAI_API_KEY:}
ai.openai.model=${AI_OPENAI_MODEL:gpt-4o-mini}
ai.deepseek.api-key=${AI_DEEPSEEK_API_KEY:}
ai.deepseek.model=${AI_DEEPSEEK_MODEL:deepseek-chat}

evaluation.async.enabled=${EVALUATION_ASYNC_ENABLED:true}
evaluation.redis.queue=${EVALUATION_REDIS_QUEUE:evaluation:jobs}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false
