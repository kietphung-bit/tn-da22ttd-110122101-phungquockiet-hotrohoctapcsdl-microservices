services:
  redis:
    image: redis:7-alpine
    container_name: datn-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - datn-local
    restart: unless-stopped

  postgres-pgvector:
    image: pgvector/pgvector:pg16
    container_name: datn-postgres-pgvector
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tempdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - datn_postgres_pgvector_data:/var/lib/postgresql/data
      - ./docker/postgres/init-pgvector.sql:/docker-entrypoint-initdb.d/01-init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tempdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - datn-local
    restart: unless-stopped

  ai-worker:
    build:
      context: ./ai-worker
    container_name: datn-ai-worker
    environment:
      AI_WORKER_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}@postgres-pgvector:5432/${POSTGRES_DB:-tempdb}
      AI_WORKER_REDIS_HOST: redis
      AI_WORKER_REDIS_PORT: 6379
      AI_WORKER_EVALUATION_QUEUE_NAME: ${AI_WORKER_EVALUATION_QUEUE_NAME:-evaluation:jobs}
      AI_WORKER_EVALUATION_DEAD_LETTER_QUEUE_NAME: ${AI_WORKER_EVALUATION_DEAD_LETTER_QUEUE_NAME:-evaluation:jobs:dead-letter}
      AI_WORKER_EVALUATION_MAX_RETRIES: ${AI_WORKER_EVALUATION_MAX_RETRIES:-3}
      AI_WORKER_REDIS_WORKER_ENABLED: ${AI_WORKER_REDIS_WORKER_ENABLED:-true}
      AI_WORKER_EVALUATION_PROVIDER: ${AI_WORKER_EVALUATION_PROVIDER:-MOCK}
      AI_WORKER_EVALUATION_PROVIDER_TIMEOUT_SECONDS: ${AI_WORKER_EVALUATION_PROVIDER_TIMEOUT_SECONDS:-30}
      AI_WORKER_GEMINI_API_KEY: ${AI_WORKER_GEMINI_API_KEY:-}
      AI_WORKER_GEMINI_MODEL: ${AI_WORKER_GEMINI_MODEL:-gemini-2.0-flash}
      AI_WORKER_DEEPSEEK_API_KEY: ${AI_WORKER_DEEPSEEK_API_KEY:-}
      AI_WORKER_DEEPSEEK_BASE_URL: ${AI_WORKER_DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      AI_WORKER_DEEPSEEK_MODEL: ${AI_WORKER_DEEPSEEK_MODEL:-deepseek-v4-flash}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres-pgvector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - datn-local
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: datn-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-pgvector:5432/${POSTGRES_DB:-tempdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EVALUATION_ASYNC_ENABLED: ${EVALUATION_ASYNC_ENABLED:-true}
      EVALUATION_REDIS_QUEUE: ${EVALUATION_REDIS_QUEUE:-evaluation:jobs}
      AI_PROVIDER: ${AI_PROVIDER:-MOCK}
      AI_RAG_TOP_K: ${AI_RAG_TOP_K:-3}
      AI_CHAT_RATE_LIMIT_PER_MINUTE: ${AI_CHAT_RATE_LIMIT_PER_MINUTE:-10}
      AI_CHAT_HISTORY_WINDOW_MESSAGES: ${AI_CHAT_HISTORY_WINDOW_MESSAGES:-8}
      AI_EMBEDDING_PROVIDER: ${AI_EMBEDDING_PROVIDER:-MOCK}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-mock-hashing-embedding}
      AI_EMBEDDING_DIMENSION: ${AI_EMBEDDING_DIMENSION:-384}
      AI_EMBEDDING_PGVECTOR_ENABLED: ${AI_EMBEDDING_PGVECTOR_ENABLED:-true}
      AI_VECTOR_RETRIEVAL_ENABLED: ${AI_VECTOR_RETRIEVAL_ENABLED:-true}
      AI_EMBEDDING_VECTOR_INDEX_ENABLED: ${AI_EMBEDDING_VECTOR_INDEX_ENABLED:-true}
      AI_EMBEDDING_GENERATE_ON_STARTUP: ${AI_EMBEDDING_GENERATE_ON_STARTUP:-false}
      AI_GEMINI_API_KEY: ${AI_GEMINI_API_KEY:-}
      AI_GEMINI_MODEL: ${AI_GEMINI_MODEL:-gemini-2.0-flash}
      AI_OPENAI_API_KEY: ${AI_OPENAI_API_KEY:-}
      AI_OPENAI_MODEL: ${AI_OPENAI_MODEL:-gpt-4o-mini}
      AI_DEEPSEEK_API_KEY: ${AI_DEEPSEEK_API_KEY:-}
      AI_DEEPSEEK_BASE_URL: ${AI_DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      AI_DEEPSEEK_MODEL: ${AI_DEEPSEEK_MODEL:-deepseek-v4-flash}
      AI_DEEPSEEK_TIMEOUT_SECONDS: ${AI_DEEPSEEK_TIMEOUT_SECONDS:-30}
      JWT_SECRET: ${JWT_SECRET:-changeit-changeit-changeit-changeit-please}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-true}
      APP_SEED_DEFAULT_PASSWORD: ${APP_SEED_DEFAULT_PASSWORD:-Password123!}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD:-}
      APP_SEED_INSTRUCTOR_PASSWORD: ${APP_SEED_INSTRUCTOR_PASSWORD:-}
      APP_SEED_STUDENT_PASSWORD: ${APP_SEED_STUDENT_PASSWORD:-}
      APP_SEED_RESET_EXISTING_PASSWORDS: ${APP_SEED_RESET_EXISTING_PASSWORDS:-false}
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres-pgvector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - datn-local
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: datn-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - datn-local
    restart: unless-stopped

volumes:
  datn_postgres_pgvector_data:

networks:
  datn-local:
    name: datn-local
